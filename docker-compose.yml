services:
  api:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      SYNC_TOKEN: ${SYNC_TOKEN:?set SYNC_TOKEN in .env}
      DATA_KEY: ${DATA_KEY:?set DATA_KEY in .env}
      DATA_PATH: /data/notes.json
    volumes:
      - ideavault_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  ideavault_data:
  caddy_data:
  caddy_config: