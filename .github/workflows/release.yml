name: Build and release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: server/go.mod

      - name: Test sync server
        working-directory: server
        run: go test ./...

      - name: Validate Docker Compose
        env:
          DOMAIN: notes.example.com
          ADMIN_TOKEN: abcdef0123456789abcdef0123456789
          OWNER_USERNAME: owner
          ALLOW_REGISTRATION: true
          SYNC_TOKEN: 0123456789abcdef0123456789abcdef
          DATA_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.nginx.yml config --quiet
          docker compose build api
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/ideavault-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/ideavault-release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Name APK
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then VERSION="1.0-${GITHUB_RUN_NUMBER}"; fi
          cp app/build/outputs/apk/release/app-release.apk "IdeaVault-${VERSION}.apk"
          echo "APK_NAME=IdeaVault-${VERSION}.apk" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: IdeaVault-APK
          path: ${{ env.APK_NAME }}

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: IdeaVault ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.APK_NAME }}